name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        # base-href must match the Pages sub-path (/<repo>/).
        run: flutter build web --release --base-href /plotproof/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
