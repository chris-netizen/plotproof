name: plotproof
description: Geo-anchored land claim ledger on Monad. Check before you pay.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web3dart: ^2.7.3
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  geolocator: ^12.0.0
  image_picker: ^1.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  path_provider: ^2.1.3
  intl: ^0.19.0

flutter:
  uses-material-design: true
